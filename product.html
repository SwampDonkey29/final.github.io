<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Products</title>
  </head>
  <body>
    <div class="container mt-4">
      <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <a class="navbar-brand" href="final.html">Home</a>
        <ul class="navbar-nav">
          <li class="nav-item active"><a class="nav-link" href="product.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        </ul>
      </nav>
      <h3>Items in Cart: <span id="cartCount">0</span></h3>
      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="card">
            <img src="choc.jpeg" class="card-img-top" alt="choc cookies">
            <div class="card-body">
              <h5 class="card-title">Chocolate Chip Cookie</h5>
              <p class="card-text">Delicious cookies with melting chocolate chips.</p>
              <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
            </div>
          </div>
        </div>
        <div class="col-md-4 mb-4">
          <div class="card">
            <img src="choc.jpeg" class="card-img-top" alt="choc cookies">
            <div class="card-body">
              <h5 class="card-title">Chocolate Chip Cookie</h5>
              <p class="card-text">Delicious cookies with melting chocolate chips.</p>
              <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      document.getElementById("cartCount").innerText =
        localStorage.getItem("cartCount") || 0;
      function addToCart() {
        let count = Number(localStorage.getItem("cartCount")) || 0;
        count++;
        localStorage.setItem("cartCount", count);
        document.getElementById("cartCount").innerText = count;
      }
    </script>
  </body>
</html>
